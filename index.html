<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Periodic Table of Elements</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: rgba(255,255,255,0.07);
    --text: #e8e8f0;
    --muted: #6b6b80;
    --accent: #00d4ff;

    --alkali: #ff6b6b;
    --alkaline: #ffa94d;
    --transition: #74c0fc;
    --post-transition: #a9e34b;
    --metalloid: #63e6be;
    --nonmetal: #f783ac;
    --halogen: #da77f2;
    --noble: #9775fa;
    --lanthanide: #66d9e8;
    --actinide: #ffd43b;
    --unknown: #868e96;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: auto;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 40% at 20% 20%, rgba(0,212,255,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 60% at 80% 80%, rgba(151,117,250,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    padding: 2.5rem 2rem 1rem;
    position: relative;
    z-index: 1;
  }

  .header-inner {
    max-width: 1600px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 2rem;
    flex-wrap: wrap;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 6vw, 5rem);
    letter-spacing: 0.08em;
    line-height: 0.9;
    color: #fff;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 0.5rem;
    font-family: 'Space Mono', monospace;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem 1rem;
    align-items: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: color 0.2s;
  }

  .legend-item:hover { color: var(--text); }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .effect-toggle {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.4rem 0.8rem;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
    margin-left: 1rem;
  }

  .effect-toggle:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .table-wrapper {
    position: relative;
    z-index: 1;
    padding: 1rem 2rem 2rem;
    overflow-x: auto;
  }

  .table-inner {
    max-width: 1600px;
    margin: 0 auto;
  }

  .pt-grid {
    display: grid;
    grid-template-columns: repeat(18, minmax(54px, 1fr));
    grid-template-rows: repeat(10, minmax(54px, auto));
    gap: 3px;
    min-width: 1000px;
  }

  .el {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 5px;
    cursor: pointer;
    position: relative;
    transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 54px;
    overflow: hidden;
  }

  .el::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--cat-color);
    opacity: 0.8;
  }

  .el:hover {
    transform: scale(1.12) translateY(-2px);
    border-color: var(--cat-color);
    box-shadow: 0 0 20px -4px var(--cat-color), 0 8px 24px rgba(0,0,0,0.4);
    z-index: 100;
  }
  
  .el.category-dimmed:hover {
    transform: scale(1.08);
    filter: grayscale(0.5) brightness(0.8);
  }

  .el.active {
    border-color: var(--cat-color);
    box-shadow: 0 0 0 2px var(--cat-color);
  }

  .el.category-highlighted {
    border-color: var(--cat-color);
    box-shadow: 0 0 12px var(--cat-color), 0 0 20px var(--cat-color), inset 0 0 8px rgba(255,255,255,0.08);
    z-index: 50;
    animation: categoryGrow 0.4s ease-out forwards;
    filter: brightness(1.15) saturate(1.2);
  }

  .el.category-highlighted-static {
    border-color: var(--cat-color);
    box-shadow: 0 0 20px -4px var(--cat-color), 0 8px 24px rgba(0,0,0,0.4);
    z-index: 50;
    filter: brightness(1.15) saturate(1.2);
  }

  @keyframes categoryGrow {
    from {
      transform: scale(1);
      opacity: 0.6;
    }
    to {
      transform: scale(1.15);
      opacity: 1;
    }
  }

  .el.category-shrinking {
    animation: categoryShrink 0.4s ease-out forwards;
  }

  @keyframes categoryShrink {
    from {
      transform: scale(1.15);
      opacity: 1;
    }
    to {
      transform: scale(1);
      opacity: 0.6;
    }
  }

  .el.category-dimmed {
    opacity: 0.15;
    filter: grayscale(0.7) brightness(0.6);
    transition: opacity 0.3s ease, filter 0.3s ease;
  }
  
  .el.category-dimmed .el-symbol,
  .el.category-dimmed .el-name {
    color: rgba(255,255,255,0.2) !important;
  }
  
  .el.category-dimmed::before {
    opacity: 0.2;
  }

  .legend-item.active-filter {
    color: var(--accent);
    font-weight: 600;
  }

  .el-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    line-height: 1;
    font-weight: 600;
  }

  .el-symbol {
    font-family: 'DM Sans', sans-serif;
    font-size: 1.35rem;
    color: var(--cat-color);
    line-height: 1;
    letter-spacing: 0.02em;
  }

  .el-name {
    font-size: 0.42rem;
    color: var(--text);
    line-height: 1.2;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 500;
  }

  .el-mass {
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    color: rgba(255,255,255,0.5);
  }

  .spacer { background: transparent; border: none; pointer-events: none; }

  .gap-cell {
    background: var(--surface);
    border: 1px dashed rgba(255,255,255,0.1);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.55rem;
    color: rgba(255,255,255,0.2);
    font-family: 'Space Mono', monospace;
  }

  #info-panel {
    position: fixed;
    right: 2rem;
    bottom: 2rem;
    width: 280px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    z-index: 999;
    transform: translateY(120%);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  #info-panel.visible { transform: translateY(0); }

  #info-panel .panel-symbol {
    font-family: 'DM Sans', sans-serif;
    font-size: 4rem;
    line-height: 1;
    letter-spacing: 0.05em;
  }

  #info-panel .panel-name {
    font-size: 1.1rem;
    font-weight: 500;
    margin-top: 0.25rem;
  }

  #info-panel .panel-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  .panel-divider {
    height: 1px;
    background: var(--border);
    margin: 1rem 0;
  }

  .panel-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.5rem;
  }

  .panel-label {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .panel-value {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    color: var(--text);
  }

  .panel-category {
    display: inline-block;
    padding: 0.2rem 0.6rem;
    border-radius: 3px;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 0.5rem;
    font-family: 'Space Mono', monospace;
  }

  .close-btn {
    position: absolute;
    top: 0.75rem; right: 0.75rem;
    background: none; border: none;
    color: var(--muted); font-size: 1rem;
    cursor: pointer; line-height: 1;
    padding: 0.25rem;
    transition: color 0.2s;
  }
  .close-btn:hover { color: var(--text); }

  @media (max-width: 700px) {
    header { padding: 1.5rem 1rem 0.5rem; }
    .table-wrapper { padding: 0.5rem 0.5rem 1rem; }
    #info-panel { right: 0.5rem; bottom: 0.5rem; width: calc(100vw - 1rem); }
  }
</style>
</head>

<header>

</div>

<div id="info-panel">
  <button class="close-btn" onclick="closePanel()">✕</button>
  <div id="panel-content"></div>
</div>

  [106,'Sg','Seaborgium','[271]','transition',6,7,'Solid','[Rn] 5f¹⁴6d⁴7s²'],
  [107,'Bh','Bohrium','[272]','transition',7,7,'Solid','[Rn] 5f¹⁴6d⁵7s²'],
  [108,'Hs','Hassium','[270]','transition',8,7,'Solid','[Rn] 5f¹⁴6d⁶7s²'],
  [109,'Mt','Meitnerium','[278]','unknown',9,7,'Solid','[Rn] 5f¹⁴6d⁷7s²'],
  [110,'Ds','Darmstadtium','[281]','unknown',10,7,'Solid','[Rn] 5f¹⁴6d⁸7s²'],
  [111,'Rg','Roentgenium','[282]','unknown',11,7,'Solid','[Rn] 5f¹⁴6d⁹7s²'],
  [112,'Cn','Copernicium','[285]','transition',12,7,'Gas','[Rn] 5f¹⁴6d¹⁰7s²'],
  [113,'Nh','Nihonium','[286]','unknown',13,7,'Solid','[Rn] 5f¹⁴6d¹⁰7s²7p¹'],
  [114,'Fl','Flerovium','[289]','unknown',14,7,'Solid','[Rn] 5f¹⁴6d¹⁰7s²7p²'],
  [115,'Mc','Moscovium','[290]','unknown',15,7,'Solid','[Rn] 5f¹⁴6d¹⁰7s²7p³'],
  [116,'Lv','Livermorium','[293]','unknown',16,7,'Solid','[Rn] 5f¹⁴6d¹⁰7s²7p⁴'],
  [117,'Ts','Tennessine','[294]','unknown',17,7,'Solid','[Rn] 5f¹⁴6d¹⁰7s²7p⁵'],
  [118,'Og','Oganesson','[294]','noble',18,7,'Gas','[Rn] 5f¹⁴6d¹⁰7s²7p⁶'],
];

const byNumber = {};
ELEMENTS.forEach(e => byNumber[e[0]] = e);

let currentEffect = 'animated';

function buildGrid() {
  const grid = document.getElementById('pt-grid');
  const cells = Array.from({length:10}, () => Array(18).fill(null));

  ELEMENTS.forEach(el => {
    const [num, sym, name, mass, cat, group, period] = el;
    if (group && period) cells[period - 1][group - 1] = el;
  });

  const lanthanides = ELEMENTS.filter(e => e[4] === 'lanthanide');
  const actinides   = ELEMENTS.filter(e => e[4] === 'actinide');
  lanthanides.forEach((el, i) => { cells[8][i+2] = el; });
  actinides.forEach((el, i)   => { cells[9][i+2] = el; });

  for (let r = 0; r < 10; r++) {
    if (r === 7) {
      for (let c = 0; c < 18; c++) {
        const sp = document.createElement('div');
        sp.className = 'spacer';
        sp.style.cssText = `grid-column:${c+1};grid-row:${r+1}`;
        grid.appendChild(sp);
      }
      continue;
    }
    for (let c = 0; c < 18; c++) {
      const el = cells[r][c];
      if (!el) {
        const sp = document.createElement('div');
        if ((r === 5 || r === 6) && c === 2) {
          sp.className = 'gap-cell el';
          sp.style.cssText = `grid-column:${c+1};grid-row:${r+1};--cat-color:var(--muted)`;
          sp.innerHTML = `<span style="font-size:0.55rem;color:var(--muted);text-align:center;line-height:1.3">${r===5?'57–71':'89–103'}</span>`;
        } else {
          sp.className = 'spacer';
          sp.style.cssText = `grid-column:${c+1};grid-row:${r+1}`;
        }
        grid.appendChild(sp);
        continue;
      }
      const [num, sym, name, mass, cat] = el;
      const colorVar = CATEGORIES[cat]?.color || 'var(--unknown)';
      const div = document.createElement('div');
      div.className = 'el';
      div.style.cssText = `grid-column:${c+1};grid-row:${r+1};--cat-color:${colorVar}`;
      div.dataset.num = num;
      div.dataset.category = cat;
      
      // Special handling for series labels in group 3
      if (num === 71 && c === 2) {
        div.innerHTML = `
          <div class="el-symbol" style="font-size: 0.8rem; color: var(--text);">La-Lu</div>
          <div class="el-name" style="font-size: 0.5rem; margin-top: 2px;">57–71</div>
        `;
        div.style.pointerEvents = 'none';
      } else if (num === 103 && c === 2) {
        div.innerHTML = `
          <div class="el-symbol" style="font-size: 0.8rem; color: var(--text);">Ac-Lr</div>
          <div class="el-name" style="font-size: 0.5rem; margin-top: 2px;">89–103</div>
        `;
        div.style.pointerEvents = 'none';
      } else {
        div.innerHTML = `
          <div class="el-num">${num}</div>
          <div class="el-symbol">${sym}</div>
          <div class="el-name">${name}</div>
          <div class="el-mass">${mass}</div>
        `;
        div.addEventListener('click', () => {
          // if a filter is active and this element isn't in that category, deselect filter
          if (activeCategory && cat !== activeCategory) {
            const legendItem = document.querySelector(`.legend-item[data-category="${activeCategory}"]`);
            toggleCategoryFilter(activeCategory, legendItem, false);
            return;
          }
          showElement(num);
        });
      }
      
      grid.appendChild(div);
    }
  }
}

let activeEl = null;

function showElement(num) {
  const el = byNumber[num];
  if (!el) return;
  const [n, sym, name, mass, cat, group, period, state, config] = el;
  // ignore requests when a filter is active and element isn't in that category
  if (activeCategory && cat !== activeCategory) return;
  const colorVar = CATEGORIES[cat]?.color || 'var(--unknown)';

  if (activeEl) document.querySelector(`.el[data-num="${activeEl}"]`)?.classList.remove('active');
  activeEl = num;
  document.querySelector(`.el[data-num="${num}"]`)?.classList.add('active');

  document.getElementById('panel-content').innerHTML = `
    <div class="panel-symbol" style="color:${colorVar}">${sym}</div>
    <div class="panel-name">${name}</div>
    <div class="panel-num">Atomic Number ${n}</div>
    <div class="panel-divider"></div>
    <div class="panel-row"><span class="panel-label">Atomic Mass</span><span class="panel-value">${mass} u</span></div>
    <div class="panel-row"><span class="panel-label">State (STP)</span><span class="panel-value">${state}</span></div>
    ${group  ? `<div class="panel-row"><span class="panel-label">Group</span><span class="panel-value">${group}</span></div>` : ''}
    ${period ? `<div class="panel-row"><span class="panel-label">Period</span><span class="panel-value">${period}</span></div>` : ''}
    <div class="panel-row"><span class="panel-label">Config</span><span class="panel-value" style="font-size:0.7rem">${config}</span></div>
    <div><span class="panel-category" style="background:${colorVar}22;color:${colorVar};border:1px solid ${colorVar}44">${CATEGORIES[cat]?.label || 'Unknown'}</span></div>
  `;

  document.getElementById('info-panel').classList.add('visible');
}

function closePanel() {
  document.getElementById('info-panel').classList.remove('visible');
  if (activeEl) {
    document.querySelector(`.el[data-num="${activeEl}"]`)?.classList.remove('active');
    activeEl = null;
  }
}

// Build legend
const legendEl = document.getElementById('legend');
let activeCategory = null;

Object.entries(CATEGORIES).forEach(([key, {label, color}]) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.dataset.category = key;
  item.innerHTML = `<div class="legend-dot" style="background:${color}"></div>${label}`;
  item.addEventListener('click', () => toggleCategoryFilter(key, item, true));
  legendEl.appendChild(item);
});

// Effect toggle
const effectToggle = document.getElementById('effect-toggle');
effectToggle.addEventListener('click', () => {
  currentEffect = currentEffect === 'animated' ? 'static' : 'animated';
  effectToggle.textContent = `Effect: ${currentEffect === 'animated' ? 'Thick Outline' : 'Soft Glow'}`;
  // If a category is active, reapply the effect
  if (activeCategory) {
    const legendItem = document.querySelector(`.legend-item[data-category="${activeCategory}"]`);
    // temporarily deselect and reselect to reapply the new effect; treat as hard deselect
    toggleCategoryFilter(activeCategory, legendItem, true);
    toggleCategoryFilter(activeCategory, legendItem, true);
  }
});

function toggleCategoryFilter(category, legendItem, isHardDeselect = false) {
  const highlightClass = currentEffect === 'animated' ? 'category-highlighted' : 'category-highlighted-static';
  if (activeCategory === category) {
    // Deselect if clicking the same category - reverse domino effect
    activeCategory = null;
    legendItem.classList.remove('active-filter');
    
    const highlightedElements = document.querySelectorAll(`.el.${highlightClass}`);
    if (currentEffect === 'animated' && isHardDeselect) {
      highlightedElements.forEach((el, index) => {
          // apply shrinking animation with stagger
        el.classList.add('category-shrinking');
        el.style.animationDelay = `${(highlightedElements.length - 1 - index) * 0.05}s`;
      });
      
      // After animation completes, clear classes
      // Calculate timeout based on number of elements for smooth animation
      const maxStaggerDelay = (highlightedElements.length - 1) * 0.05;
      const totalAnimationTime = (maxStaggerDelay + 0.4) * 1000; // convert to ms
      setTimeout(() => {
        document.querySelectorAll('.el').forEach(el => {
          el.classList.remove('category-highlighted', 'category-highlighted-static');
          el.classList.remove('category-dimmed');
          el.classList.remove('category-shrinking');
          el.style.animationDelay = '';
        });
      }, totalAnimationTime);
    } else {
      // instant removal (either static effect or soft deselect from element click)
      document.querySelectorAll('.el').forEach(el => {
        el.classList.remove('category-highlighted', 'category-highlighted-static');
        el.classList.remove('category-dimmed');
        el.style.animationDelay = '';
      });
    }
  } else {
    // Select new category
    if (activeCategory) {
      document.querySelector(`.legend-item[data-category="${activeCategory}"]`)?.classList.remove('active-filter');
    }
    activeCategory = category;
    legendItem.classList.add('active-filter');
    
    // Dim all elements first
    document.querySelectorAll('.el').forEach(el => {
      el.classList.remove('category-highlighted', 'category-highlighted-static');
      el.classList.add('category-dimmed');
      el.style.animationDelay = '';
    });
    
    // Highlight and undim selected category with staggered animation
    const selectedElements = document.querySelectorAll(`.el[data-category="${category}"]`);
    selectedElements.forEach((el, index) => {
      el.classList.remove('category-dimmed');
      el.classList.add(highlightClass);
      if (currentEffect === 'animated') {
        // Stagger animation based on order for domino effect
        el.style.animationDelay = `${index * 0.05}s`;
      }
    });
  }
}

buildGrid();

document.querySelectorAll('.el:not(.spacer):not(.gap-cell)').forEach((el, i) => {
  el.style.opacity = '0';
  el.style.transform = 'scale(0.85)';
  el.style.transition = `opacity 0.3s ease ${i*4}ms, transform 0.3s ease ${i*4}ms`;
  setTimeout(() => {
    el.style.opacity = '1';
    el.style.transform = '';
  }, 50 + i * 4);
});
</script>
</body>
</html>
