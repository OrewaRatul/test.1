<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChemLab – Periodic Table</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=Playfair+Display:wght@400;700&family=IBM+Plex+Mono:wght@400;500&family=Raleway:wght@300;400;600;700&family=Josefin+Sans:wght@300;400;600&family=Cormorant+Garamond:wght@400;600&family=Exo+2:wght@300;400;600&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CSS VARIABLES & RESET
============================================================ */
:root {
  --font-body: 'Raleway', sans-serif;
  --font-logo: 'Outfit', sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;

  /* Night mode (default) */
  --bg: #080b12;
  --bg2: #0d1120;
  --surface: #111827;
  --surface2: #1a2236;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #e8eaf2;
  --text2: #9ba3b8;
  --text3: #5a6380;
  --accent: #4f8ef7;
  --shadow: rgba(0,0,0,0.6);

  /* Category colors */
  --alkali: #f87171;
  --alkaline: #fb923c;
  --transition: #60a5fa;
  --post-transition: #86efac;
  --metalloid: #34d399;
  --nonmetal: #f472b6;
  --halogen: #c084fc;
  --noble: #818cf8;
  --lanthanide: #22d3ee;
  --actinide: #fbbf24;
  --unknown: #94a3b8;
}

[data-theme="day"] {
  --bg: #f0f2f7;
  --bg2: #e4e8f0;
  --surface: #ffffff;
  --surface2: #f5f7fc;
  --border: rgba(0,0,0,0.09);
  --border2: rgba(0,0,0,0.15);
  --text: #111827;
  --text2: #4b5563;
  --text3: #9ca3af;
  --accent: #2563eb;
  --shadow: rgba(0,0,0,0.15);

  --alkali: #dc2626;
  --alkaline: #ea580c;
  --transition: #2563eb;
  --post-transition: #16a34a;
  --metalloid: #059669;
  --nonmetal: #db2777;
  --halogen: #7c3aed;
  --noble: #4338ca;
  --lanthanide: #0891b2;
  --actinide: #d97706;
  --unknown: #6b7280;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  transition: background 0.4s, color 0.4s;
  overflow-x: hidden;
}

/* ============================================================
   INTRO SPLASH SCREEN
============================================================ */
#splash {
  position: fixed;
  inset: 0;
  background: #080b12;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  flex-direction: column;
  gap: 0.5rem;
}

.splash-logo {
  font-family: 'Outfit', sans-serif;
  font-size: clamp(3.5rem, 10vw, 8rem);
  font-weight: 900;
  letter-spacing: 0.04em;
  opacity: 0;
  transform: translateY(20px);
  animation: splashIn 0.8s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
}

.splash-logo .chem { color: #fff; }
.splash-logo .lab  { color: #4f8ef7; }

.splash-sub {
  font-family: 'Outfit', sans-serif;
  font-size: clamp(1rem, 3vw, 1.8rem);
  font-weight: 300;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  opacity: 0;
  animation: splashIn 0.7s cubic-bezier(0.22,1,0.36,1) 0.7s forwards;
}

.splash-sub .table-word { color: #4f8ef7; }

.splash-bar {
  width: 200px;
  height: 2px;
  background: rgba(255,255,255,0.1);
  border-radius: 99px;
  margin-top: 2rem;
  overflow: hidden;
  opacity: 0;
  animation: splashIn 0.5s ease 1.1s forwards;
}

.splash-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #4f8ef7, #818cf8);
  border-radius: 99px;
  animation: barFill 1.2s ease 1.2s forwards;
}

@keyframes splashIn {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes barFill {
  to { width: 100%; }
}
@keyframes splashOut {
  to { opacity: 0; pointer-events: none; transform: scale(1.04); }
}

#splash.done {
  animation: splashOut 0.6s cubic-bezier(0.4,0,1,1) forwards;
}

/* ============================================================
   MAIN LAYOUT
============================================================ */
#app {
  opacity: 0;
  transition: opacity 0.6s ease;
}
#app.visible { opacity: 1; }

/* ============================================================
   TOP BAR
============================================================ */
.topbar {
  position: sticky;
  top: 0;
  z-index: 500;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(10px);
  padding: 0.75rem 2rem;
  transition: background 0.4s, border-color 0.4s;
}

.topbar-inner {
  max-width: 1650px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
}

.logo {
  font-family: 'Outfit', sans-serif !important;
  font-size: 1.6rem;
  font-weight: 900;
  letter-spacing: 0.03em;
  flex-shrink: 0;
  text-decoration: none;
}
[data-theme="night"] .logo .chem { color: #fff; }
[data-theme="night"] .logo .lab  { color: #4f8ef7; }
[data-theme="day"]   .logo .chem { color: #111827; }
[data-theme="day"]   .logo .lab  { color: #dc2626; }

.search-wrap {
  flex: 1;
  min-width: 220px;
  position: relative;
}

.search-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.875rem;
  padding: 0.6rem 1rem 0.6rem 2.6rem;
  outline: none;
  transition: border-color 0.2s, background 0.4s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text3); }

.search-icon {
  position: absolute;
  left: 0.8rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 0.95rem;
  pointer-events: none;
}

.topbar-actions {
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.btn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text2);
  font-family: var(--font-body);
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  padding: 0.5rem 0.9rem;
  cursor: pointer;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
  white-space: nowrap;
}
.btn:hover { background: var(--surface); color: var(--text); border-color: var(--accent); }
.btn.active-btn { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Font dropdown */
.font-dropdown {
  position: relative;
}
.font-menu {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  overflow: hidden;
  min-width: 180px;
  z-index: 600;
  box-shadow: 0 8px 30px var(--shadow);
}
.font-menu.open { display: block; }
.font-option {
  padding: 0.65rem 1rem;
  cursor: pointer;
  font-size: 0.82rem;
  color: var(--text2);
  transition: background 0.15s, color 0.15s;
  border-bottom: 1px solid var(--border);
}
.font-option:last-child { border-bottom: none; }
.font-option:hover { background: var(--surface2); color: var(--text); }
.font-option.selected { color: var(--accent); }

/* ============================================================
   AI ANSWER BOX
============================================================ */
#ai-answer {
  max-width: 1650px;
  margin: 0 auto;
  padding: 0 2rem;
  display: none;
}
#ai-answer.visible { display: block; }

.ai-box {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-left: 3px solid var(--accent);
  border-radius: 12px;
  padding: 1.2rem 1.5rem;
  margin-top: 1rem;
  position: relative;
  animation: slideDown 0.3s ease;
}

@keyframes slideDown {
  from { opacity:0; transform: translateY(-8px); }
  to   { opacity:1; transform: translateY(0); }
}

.ai-box-header {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-bottom: 0.75rem;
}

.ai-badge {
  background: var(--accent);
  color: #fff;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  font-family: var(--font-mono);
}

.ai-question {
  font-size: 0.82rem;
  color: var(--text2);
  font-style: italic;
}

.ai-text {
  font-size: 0.88rem;
  line-height: 1.7;
  color: var(--text);
}

.ai-close {
  position: absolute;
  top: 0.8rem; right: 0.8rem;
  background: none; border: none;
  color: var(--text3); cursor: pointer;
  font-size: 1rem; line-height: 1;
  transition: color 0.2s;
}
.ai-close:hover { color: var(--text); }

.ai-loading {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  color: var(--text2);
  font-size: 0.85rem;
}

.dots {
  display: flex; gap: 4px;
}
.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: dotBounce 1.2s infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotBounce {
  0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
  40%         { transform: scale(1);   opacity: 1;   }
}

/* ============================================================
   HEADER (below topbar)
============================================================ */
header {
  padding: 1.5rem 2rem 0.5rem;
  max-width: 1650px;
  margin: 0 auto;
}

.header-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 1.5rem;
  flex-wrap: wrap;
}

.page-title {
  font-family: 'Outfit', sans-serif !important;
  font-size: clamp(1.6rem, 4vw, 2.8rem);
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--text);
  line-height: 1;
}
[data-theme="day"]   .page-title .periodic-word { color: var(--text); }
[data-theme="night"] .page-title .periodic-word { color: var(--text); }
[data-theme="day"]   .page-title .table-word2  { color: #dc2626; }
[data-theme="night"] .page-title .table-word2  { color: #4f8ef7; }

.page-sub {
  font-size: 0.78rem;
  color: var(--text3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-top: 0.3rem;
  font-family: var(--font-mono);
}

/* Legend */
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem 0.9rem;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  font-size: 0.7rem;
  color: var(--text2);
  cursor: pointer;
  transition: color 0.2s;
  padding: 0.2rem 0.5rem;
  border-radius: 6px;
  border: 1px solid transparent;
  transition: all 0.2s;
}
.legend-item:hover { color: var(--text); border-color: var(--border2); background: var(--surface2); }
.legend-item.active-legend { border-color: currentColor; background: var(--surface2); }

.legend-dot {
  width: 9px; height: 9px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* ============================================================
   PERIODIC TABLE GRID
============================================================ */
.table-wrapper {
  padding: 1rem 2rem 2rem;
  overflow-x: auto;
}

.table-inner {
  max-width: 1650px;
  margin: 0 auto;
}

.pt-grid {
  display: grid;
  grid-template-columns: repeat(18, minmax(52px, 1fr));
  grid-template-rows: repeat(10, minmax(56px, auto));
  gap: 3px;
  min-width: 980px;
}

/* Element cell */
.el {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 5px 4px;
  cursor: pointer;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 56px;
  overflow: hidden;
  transition:
    transform 0.18s cubic-bezier(0.34,1.3,0.64,1),
    border-color 0.18s ease,
    box-shadow 0.18s ease,
    opacity 0.25s ease,
    filter 0.25s ease;
}

.el::after {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--cat-color);
  border-radius: 6px 0 0 6px;
}

.el:hover {
  transform: scale(1.13) translateY(-3px);
  border-color: var(--cat-color);
  box-shadow: 0 6px 20px -4px rgba(0,0,0,0.35);
  z-index: 100;
}

.el.highlighted {
  opacity: 1 !important;
  filter: none !important;
  border-color: var(--cat-color);
}

.el.dimmed {
  opacity: 0.15;
  filter: grayscale(0.6);
}

.el.active-el {
  border-color: var(--cat-color);
  box-shadow: 0 0 0 2px var(--cat-color);
}

.el-num {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  color: var(--text3);
  line-height: 1;
}

.el-symbol {
  font-size: 1.3rem;
  color: var(--cat-color);
  font-weight: 600;
  line-height: 1;
  letter-spacing: 0.01em;
}

.el-name {
  font-size: 0.5rem;
  color: var(--text2);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  letter-spacing: 0.02em;
}

.el-mass {
  font-family: var(--font-mono);
  font-size: 0.46rem;
  color: var(--text3);
}

.spacer { background: transparent; border: none; pointer-events: none; }

.gap-cell {
  background: var(--surface);
  border: 1px dashed var(--border2);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: default;
}
.gap-cell span {
  font-family: var(--font-mono);
  font-size: 0.54rem;
  color: var(--text3);
  text-align: center;
  line-height: 1.4;
}

/* Lanthanide / Actinide label cells */
.series-label {
  grid-column: 1 / 3;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.58rem;
  color: var(--text3);
  font-family: var(--font-mono);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding-right: 4px;
  text-align: right;
}

/* ============================================================
   INFO PANEL (side card)
============================================================ */
#info-panel {
  position: fixed;
  right: 1.5rem;
  bottom: 1.5rem;
  width: 300px;
  max-height: 88vh;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  z-index: 900;
  transform: translateY(calc(100% + 2rem));
  transition: transform 0.38s cubic-bezier(0.34,1.3,0.64,1), background 0.4s, border-color 0.4s;
  box-shadow: 0 20px 60px var(--shadow);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

#info-panel.visible {
  transform: translateY(0);
}

.panel-top {
  padding: 1.2rem 1.2rem 0;
  flex-shrink: 0;
}

.panel-close {
  position: absolute;
  top: 0.75rem; right: 0.75rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text2);
  font-size: 0.85rem;
  cursor: pointer;
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, color 0.2s;
}
.panel-close:hover { background: var(--border2); color: var(--text); }

/* Electron animation box */
.electron-box-wrap {
  display: flex;
  align-items: flex-start;
  gap: 1rem;
  margin-bottom: 1rem;
}

.electron-stage {
  flex-shrink: 0;
  width: 80px; height: 80px;
  border: 1.5px solid var(--border2);
  border-radius: 10px;
  position: relative;
  overflow: hidden;
  background: var(--bg2);
}

.electron-canvas {
  width: 100%; height: 100%;
  display: block;
}

.panel-id {
  flex: 1;
}

.panel-symbol {
  font-size: 2.8rem;
  font-weight: 700;
  line-height: 1;
  letter-spacing: 0.02em;
}

.panel-name {
  font-size: 1rem;
  font-weight: 600;
  margin-top: 0.15rem;
  line-height: 1.2;
}

.panel-num {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text3);
  margin-top: 0.15rem;
}

.panel-cat-badge {
  display: inline-block;
  padding: 0.18rem 0.55rem;
  border-radius: 4px;
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-family: var(--font-mono);
  margin-top: 0.5rem;
}

.panel-divider {
  height: 1px;
  background: var(--border);
  margin: 0.8rem 0;
}

.panel-scroll {
  overflow-y: auto;
  padding: 0 1.2rem 1.2rem;
  flex: 1;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}

.panel-section {
  margin-bottom: 1rem;
}

.panel-section-title {
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 0.4rem;
  font-family: var(--font-mono);
}

.panel-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 0.3rem 0;
  border-bottom: 1px solid var(--border);
}
.panel-row:last-child { border-bottom: none; }

.panel-label {
  font-size: 0.72rem;
  color: var(--text2);
}

.panel-value {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text);
  text-align: right;
  max-width: 55%;
}

/* ============================================================
   FOOTER
============================================================ */
footer {
  border-top: 1px solid var(--border);
  padding: 1.5rem 2rem;
  margin-top: 1rem;
  transition: border-color 0.4s;
}

.footer-inner {
  max-width: 1650px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.footer-logo {
  font-family: 'Outfit', sans-serif !important;
  font-size: 1.1rem;
  font-weight: 900;
  letter-spacing: 0.03em;
}
[data-theme="night"] .footer-logo .chem { color: #fff; }
[data-theme="night"] .footer-logo .lab  { color: #4f8ef7; }
[data-theme="day"]   .footer-logo .chem { color: #111827; }
[data-theme="day"]   .footer-logo .lab  { color: #dc2626; }

.footer-copy {
  font-family: 'Outfit', sans-serif !important;
  font-size: 0.75rem;
  color: var(--text3);
  letter-spacing: 0.05em;
}

/* ============================================================
   RESPONSIVE
============================================================ */
@media (max-width: 768px) {
  .topbar { padding: 0.75rem 1rem; }
  .topbar-inner { gap: 0.6rem; }
  header { padding: 1rem 1rem 0.5rem; }
  .table-wrapper { padding: 0.5rem 1rem 1.5rem; }
  #info-panel {
    right: 0.75rem;
    bottom: 0.75rem;
    width: calc(100vw - 1.5rem);
    max-width: 380px;
  }
  footer { padding: 1rem 1rem; }
  .legend { gap: 0.3rem 0.6rem; }
}

/* ============================================================
   UTILITY
============================================================ */
::selection { background: var(--accent); color: #fff; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo">
    <span class="chem">Chem</span><span class="lab">Lab</span>
  </div>
  <div class="splash-sub">
    <span>Periodic </span><span class="table-word">Table</span>
  </div>
  <div class="splash-bar"><div class="splash-bar-fill"></div></div>
</div>

<!-- MAIN APP -->
<div id="app">

  <!-- TOP BAR -->
  <nav class="topbar">
    <div class="topbar-inner">
      <a class="logo" href="#">
        <span class="chem">Chem</span><span class="lab">Lab</span>
      </a>

      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          class="search-input"
          id="search-input"
          placeholder="Ask anything about elements… e.g. boiling point of gold, history of uranium"
          autocomplete="off"
        />
      </div>

      <div class="topbar-actions">
        <div class="font-dropdown" id="font-dropdown">
          <button class="btn" id="font-btn" onclick="toggleFontMenu()">Font ▾</button>
          <div class="font-menu" id="font-menu">
            <div class="font-option selected" data-font="'Raleway', sans-serif" onclick="setFont(this)">Raleway</div>
            <div class="font-option" data-font="'Playfair Display', serif" onclick="setFont(this)">Playfair Display</div>

/* ============================================================
   SPLASH → APP
============================================================ */
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('splash').classList.add('done');
    const app = document.getElementById('app');
    app.classList.add('visible');
    buildGrid();
    buildLegend();
    animateIn();

});

/* ============================================================
   THEME TOGGLE
============================================================ */
function toggleTheme() {
  const html = document.documentElement;
  const isNight = html.getAttribute('data-theme') === 'night';
  html.setAttribute('data-theme', isNight ? 'day' : 'night');
  document.getElementById('theme-btn').textContent = isNight ? '🌙 Night' : '☀ Day';
  // Redraw electron if panel open
  if (activeEl !== null) drawElectrons(byNum[activeEl]);
}

/* ============================================================
   FONT SWITCHER
============================================================ */
function toggleFontMenu() {
  document.getElementById('font-menu').classList.toggle('open');
}

document.addEventListener('click', e => {
  if (!document.getElementById('font-dropdown').contains(e.target)) {
    document.getElementById('font-menu').classList.remove('open');
  }
});

function setFont(el) {
  document.querySelectorAll('.font-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  const f = el.dataset.font;
  document.documentElement.style.setProperty('--font-body', f);
  // Apply to body but not logo elements
  document.querySelectorAll('.logo,.footer-logo,.splash-logo,.splash-sub,.page-title,.panel-cat-badge,.panel-num,.ai-badge,.el-num,.el-mass,.panel-value,.panel-section-title,.page-sub,.footer-copy').forEach(e => {});
  document.getElementById('font-menu').classList.remove('open');
}

/* ============================================================
   BUILD LEGEND
============================================================ */
function buildLegend() {
  const wrap = document.getElementById('legend');
  Object.entries(CATS).forEach(([key, {label, color}]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.dataset.cat = key;
    item.innerHTML = `<div class="legend-dot" style="background:${color}"></div>${label}`;
    item.addEventListener('click', () => filterByCategory(key, item));
    wrap.appendChild(item);
  });
}

/* ============================================================
   BUILD GRID
============================================================ */
function buildGrid() {
  const grid = document.getElementById('pt-grid');
  const cells = Array.from({length:10}, () => Array(18).fill(null));

  ELEMENTS.forEach(el => {
    const [num,sym,name,mass,cat,group,period] = el;
    if (group && period) cells[period-1][group-1] = el;
  });

  const lants = ELEMENTS.filter(e => e[4]==='lanthanide');
  const acts  = ELEMENTS.filter(e => e[4]==='actinide');
  lants.forEach((el,i) => cells[8][i+2] = el);
  acts.forEach((el,i)  => cells[9][i+2] = el);

  for (let r = 0; r < 10; r++) {
    if (r === 7) {
      for (let c = 0; c < 18; c++) {
        const sp = document.createElement('div');
        sp.className = 'spacer';
        sp.style.cssText = `grid-column:${c+1};grid-row:${r+1}`;
        grid.appendChild(sp);
      }
      continue;
    }
    for (let c = 0; c < 18; c++) {
      const el = cells[r][c];
      if (!el) {
        const sp = document.createElement('div');
        if ((r===5||r===6) && c===2) {
          sp.className = 'gap-cell';
          sp.style.cssText = `grid-column:${c+1};grid-row:${r+1}`;
          sp.innerHTML = `<span>${r===5?'57–71':'89–103'}</span>`;
        } else {
          sp.className = 'spacer';
          sp.style.cssText = `grid-column:${c+1};grid-row:${r+1}`;
        }
        grid.appendChild(sp);
        continue;
      }
      const [num,sym,name,mass,cat] = el;
      const colorVar = CATS[cat]?.color || 'var(--unknown)';
      const div = document.createElement('div');
      div.className = 'el';
      div.style.cssText = `grid-column:${c+1};grid-row:${r+1};--cat-color:${colorVar}`;
      div.dataset.num = num;
      div.dataset.cat = cat;
      div.innerHTML = `
        <div class="el-num">${num}</div>
        <div class="el-symbol">${sym}</div>
        <div class="el-name">${name}</div>
        <div class="el-mass">${mass}</div>
      `;
      div.addEventListener('click', () => showElement(num));
      grid.appendChild(div);
    }
  }
}

/* ============================================================
   CATEGORY FILTER
============================================================ */
let activeCat = null;

function filterByCategory(cat, legendItem) {
  const allLegend = document.querySelectorAll('.legend-item');
  const allEls = document.querySelectorAll('.el[data-num]');

  if (activeCat === cat) {
    // Deselect
    activeCat = null;
    allLegend.forEach(l => l.classList.remove('active-legend'));
    allEls.forEach(el => { el.classList.remove('dimmed','highlighted'); });
    return;
  }

  activeCat = cat;
  allLegend.forEach(l => l.classList.remove('active-legend'));
  legendItem.classList.add('active-legend');

  allEls.forEach(el => {
    if (el.dataset.cat === cat) {
      el.classList.add('highlighted');
      el.classList.remove('dimmed');
    } else {
      el.classList.add('dimmed');
      el.classList.remove('highlighted');
    }
  });
}

/* ============================================================
   ANIMATE IN
============================================================ */
function animateIn() {
  const els = document.querySelectorAll('.el[data-num]');
  els.forEach((el, i) => {
    el.style.opacity = '0';
    el.style.transform = 'scale(0.8)';
    el.style.transition = `opacity 0.3s ease ${i*3}ms, transform 0.3s ease ${i*3}ms`;
    requestAnimationFrame(() => {
      setTimeout(() => {
        el.style.opacity = '';
        el.style.transform = '';
      }, 30 + i * 3);
    });
  });
}

/* ============================================================
   INFO PANEL
============================================================ */
let activeEl = null;
let electronRAF = null;

function showElement(num) {
  const el = byNum[num];
  if (!el) return;
  const [n,sym,name,mass,cat,group,period,state,config,mp,bp,density,shells] = el;
  const colorVar = CATS[cat]?.color || 'var(--unknown)';

  if (activeEl !== null) {
    document.querySelector(`.el[data-num="${activeEl}"]`)?.classList.remove('active-el');
  }
  activeEl = num;
  document.querySelector(`.el[data-num="${num}"]`)?.classList.add('active-el');

  // Header
  document.getElementById('p-symbol').style.color = colorVar;
  document.getElementById('p-symbol').textContent = sym;
  document.getElementById('p-name').textContent = name;
  document.getElementById('p-num').textContent = `Atomic Number ${n}`;
  const badge = document.getElementById('p-cat');
  badge.textContent = CATS[cat]?.label || 'Unknown';
  badge.style.cssText = `background:${colorVar}20;color:${colorVar};border:1px solid ${colorVar}50`;

  // Panel scroll content
  const mpC  = typeof mp  === 'number' ? `${mp} K (${(mp-273.15).toFixed(1)} °C)` : mp;
  const bpC  = typeof bp  === 'number' ? `${bp} K (${(bp-273.15).toFixed(1)} °C)` : bp;

  document.getElementById('panel-scroll').innerHTML = `
    <div class="panel-section">
      <div class="panel-section-title">Physical Properties</div>
      <div class="panel-row"><span class="panel-label">Atomic Mass</span><span class="panel-value">${mass} u</span></div>
      <div class="panel-row"><span class="panel-label">State at STP</span><span class="panel-value">${state}</span></div>
      <div class="panel-row"><span class="panel-label">Melting Point</span><span class="panel-value">${mpC}</span></div>
      <div class="panel-row"><span class="panel-label">Boiling Point</span><span class="panel-value">${bpC}</span></div>
      <div class="panel-row"><span class="panel-label">Density</span><span class="panel-value">${density}</span></div>
    </div>
    <div class="panel-divider"></div>
    <div class="panel-section">
      <div class="panel-section-title">Atomic Structure</div>
      <div class="panel-row"><span class="panel-label">Electron Config</span><span class="panel-value" style="font-size:0.65rem">${config}</span></div>
      <div class="panel-row"><span class="panel-label">Electrons/Shell</span><span class="panel-value">${shells || 'N/A'}</span></div>
      ${group  ? `<div class="panel-row"><span class="panel-label">Group</span><span class="panel-value">${group}</span></div>` : ''}
      ${period ? `<div class="panel-row"><span class="panel-label">Period</span><span class="panel-value">${period}</span></div>` : ''}
    </div>
    <div class="panel-divider"></div>
    <div class="panel-section">
      <div class="panel-section-title">Classification</div>
      <div class="panel-row"><span class="panel-label">Category</span><span class="panel-value">${CATS[cat]?.label || 'Unknown'}</span></div>
      <div class="panel-row"><span class="panel-label">Block</span><span class="panel-value">${getBlock(config)}</span></div>
    </div>
  `;

  document.getElementById('info-panel').classList.add('visible');
  drawElectrons(el);
}

function getBlock(config) {
  if (config.includes('f')) return 'f-block';
  if (config.includes('d')) return 'd-block';
  if (config.includes('p')) return 'p-block';
  return 's-block';
}

function closePanel() {
  document.getElementById('info-panel').classList.remove('visible');
  if (activeEl !== null) {
    document.querySelector(`.el[data-num="${activeEl}"]`)?.classList.remove('active-el');
    activeEl = null;
  }
  if (electronRAF) cancelAnimationFrame(electronRAF);
}

/* ============================================================
   ELECTRON ANIMATION
============================================================ */
function drawElectrons(el) {
  if (electronRAF) cancelAnimationFrame(electronRAF);
  const canvas = document.getElementById('electron-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;
  const isDay = document.documentElement.getAttribute('data-theme') === 'day';

  const shellsStr = el[12] || '2';
  const shellCounts = shellsStr.split(',').map(Number).slice(0, 4); // max 4 shells to fit
  const numShells = shellCounts.length;

  const maxR = Math.min(cx, cy) - 4;
  const minR = 7;
  const shellRadii = [];
  for (let i = 0; i < numShells; i++) {
    shellRadii.push(minR + ((maxR - minR) / Math.max(numShells - 1, 1)) * i);
  }
  if (numShells === 1) shellRadii[0] = 14;

  const catKey = el[4];
  const colorMap = {
    alkali: '#f87171', alkaline: '#fb923c', transition: '#60a5fa',
    'post-transition': '#86efac', metalloid: '#34d399', nonmetal: '#f472b6',
    halogen: '#c084fc', noble: '#818cf8', lanthanide: '#22d3ee',
    actinide: '#fbbf24', unknown: '#94a3b8'
  };
  const dayColorMap = {
    alkali: '#dc2626', alkaline: '#ea580c', transition: '#2563eb',
    'post-transition': '#16a34a', metalloid: '#059669', nonmetal: '#db2777',
    halogen: '#7c3aed', noble: '#4338ca', lanthanide: '#0891b2',
    actinide: '#d97706', unknown: '#6b7280'
  };

  const electronColor = (isDay ? dayColorMap : colorMap)[catKey] || '#60a5fa';
  const orbitColor = isDay ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)';
  const nucleusColor = electronColor;

  // Offsets for each shell (so electrons don't all overlap when fast)
  const offsets = shellCounts.map((_, i) => (i * Math.PI * 0.73));
  const speeds  = shellCounts.map((_, i) => 0.018 + i * 0.007);

  let t = 0;

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Nucleus
    ctx.beginPath();
    ctx.arc(cx, cy, 4, 0, Math.PI*2);
    ctx.fillStyle = nucleusColor;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx, cy, 4, 0, Math.PI*2);
    ctx.strokeStyle = isDay ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    shellCounts.forEach((count, si) => {
      const r = shellRadii[si];
      // Orbit ring
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI*2);
      ctx.strokeStyle = orbitColor;
      ctx.lineWidth = 0.8;
      ctx.stroke();

      // Electrons on this shell
      for (let e = 0; e < count; e++) {
        const angle = offsets[si] + (2 * Math.PI / count) * e + t * speeds[si];
        const ex = cx + r * Math.cos(angle);
        const ey = cy + r * Math.sin(angle);

        ctx.beginPath();
        ctx.arc(ex, ey, 2.2, 0, Math.PI*2);
        ctx.fillStyle = electronColor;
        ctx.fill();
      }
    });

    t++;
    electronRAF = requestAnimationFrame(draw);
  }

  draw();
}

/* ============================================================
   AI SEARCH (Pollinations)
============================================================ */
const searchInput = document.getElementById('search-input');
let aiTimeout = null;

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const q = searchInput.value.trim();
    if (q.length > 2) askAI(q);
  }
});

async function askAI(question) {
  const aiBox = document.getElementById('ai-answer');
  const aiText = document.getElementById('ai-text');
  const aiQuestion = document.getElementById('ai-question');

  aiQuestion.textContent = `"${question}"`;
  aiText.innerHTML = `<div class="ai-loading"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><span>Searching…</span></div>`;
  aiBox.classList.add('visible');
  aiBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  const systemPrompt = `You are ChemLab AI, a chemistry expert. You ONLY answer questions strictly related to the 118 chemical elements of the periodic table. 
Topics you answer: melting point, boiling point, density, history/discovery, physical characteristics, chemical characteristics, isotopes, nuclear characteristics, laboratory preparation, industrial production, special cases, advantages, disadvantages of any of the 118 elements.
If the question is not about these topics or not about any chemical element, politely decline and say you only answer element-related chemistry questions.
Keep answers concise, accurate, and formatted cleanly. Use bullet points where helpful.`;

  try {
    const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(question)}?system=${encodeURIComponent(systemPrompt)}&model=openai&seed=42`);
    if (!res.ok) throw new Error('Network error');
    const text = await res.text();
    aiText.innerHTML = formatAIResponse(text);
  } catch (err) {
    aiText.innerHTML = `<span style="color:var(--alkali)">⚠ Could not reach the AI. Please check your connection and try again.</span>`;
  }
}

function formatAIResponse(text) {
  // Basic markdown-like formatting
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^•\s(.+)$/gm, '<li>$1</li>')
    .replace(/^-\s(.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul style="padding-left:1.2rem;margin:0.4rem 0">$1</ul>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

function closeAI() {
  document.getElementById('ai-answer').classList.remove('visible');
  searchInput.value = '';
}
