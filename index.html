<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Periodic Table of Elements</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d;
  --alkali:     #c8ff00;
  --alkaline:   #ffdd00;
  --lanthanide: #ff69b4;
  --actinide:   #ff4499;
  --transition: #00cfff;
  --post-trans: #00ff99;
  --metalloid:  #00ff66;
  --nonmetal:   #ff6600;
  --halogen:    #ff3366;
  --noble:      #cc66ff;
  --unknown:    #888888;
  --font: 'Share Tech Mono', monospace;
  --font-head: 'Orbitron', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  font-family: var(--font);
  min-height: 100vh;
  overflow-x: auto;
  user-select: none;
}
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem 1.4rem;
  padding: 0.75rem 1.2rem;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.legend-item {
  font-size: 0.7rem;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: opacity 0.2s;
  opacity: 0.8;
}
.legend-item:hover { opacity: 1; }
.pt-wrap {
  padding: 0.5rem 0.8rem 1rem;
  overflow-x: auto;
}
.pt-grid {
  display: grid;
  grid-template-columns: repeat(18, minmax(62px, 1fr));
  gap: 3px;
  min-width: 1140px;
}
.el {
  position: relative;
  border: 1px solid var(--c);
  border-radius: 3px;
  padding: 4px 4px 3px;
  cursor: pointer;
  transition: box-shadow 0.15s ease, transform 0.15s ease;
  background: rgba(0,0,0,0.5);
  min-height: 62px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  box-shadow: 0 0 5px -2px var(--c), inset 0 0 8px -5px var(--c);
}
.el:hover, .el.active {
  box-shadow: 0 0 16px 2px var(--c), inset 0 0 18px -5px var(--c);
  transform: scale(1.1);
  z-index: 50;
  background: rgba(0,0,0,0.78);
}
.el.active { transform: scale(1.0); box-shadow: 0 0 24px 4px var(--c), inset 0 0 18px -5px var(--c); }
.el-num {
  font-size: 0.58rem;
  color: var(--c);
  opacity: 0.75;
  line-height: 1;
}
.el-symbol {
  font-family: var(--font-head);
  font-size: 1.38rem;
  font-weight: 700;
  color: var(--c);
  text-shadow: 0 0 10px var(--c), 0 0 22px var(--c);
  line-height: 1;
  text-align: center;
}
.el-name {
  font-size: 0.5rem;
  color: var(--c);
  opacity: 0.7;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  text-align: center;
  letter-spacing: 0.02em;
}
.el-mass {
  font-size: 0.48rem;
  color: var(--c);
  opacity: 0.45;
  text-align: center;
}
.spacer {
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  pointer-events: none;
  min-height: 62px;
}
.gap-cell {
  border: 1px dashed rgba(255,255,255,0.12) !important;
  border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.62rem;
  color: rgba(255,255,255,0.3);
  min-height: 62px;
  cursor: default;
  box-shadow: none !important;
}
.sep-row { grid-column: 1/-1; height: 16px; }

/* Info Panel */
#info-overlay {
  position: fixed; inset: 0;
  display: none; z-index: 200;
  pointer-events: none;
}
#info-overlay.open { display: block; pointer-events: auto; }
#info-backdrop { position: absolute; inset: 0; }
#info-panel {
  position: absolute;
  right: 1.5rem; top: 50%;
  transform: translateY(-50%) scale(0.88);
  opacity: 0;
  transition: transform 0.32s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s ease;
  width: 295px;
  background: rgba(5,5,5,0.94);
  border: 1px solid #333;
  border-radius: 8px;
  padding: 1.4rem 1.3rem 1.3rem;
  pointer-events: auto;
  backdrop-filter: blur(12px);
}
#info-overlay.open #info-panel {
  transform: translateY(-50%) scale(1);
  opacity: 1;
}
.panel-close {
  position: absolute; top: 0.6rem; right: 0.8rem;
  background: none; border: none; color: #555;
  font-size: 1.1rem; cursor: pointer;
}
.panel-close:hover { color: #ccc; }
#panel-symbol {
  font-family: var(--font-head);
  font-size: 4.2rem;
  font-weight: 900;
  line-height: 1;
  letter-spacing: 0.04em;
  text-align: center;
}
#shell-wrap {
  position: relative;
  width: 130px; height: 130px;
  margin: 0.6rem auto 0;
}
.shell-orbit {
  position: absolute;
  border-radius: 50%;
  border: 1px solid currentColor;
  opacity: 0.4;
  top:50%; left:50%;
  transform: translate(-50%,-50%);
}
.shell-nucleus {
  position: absolute; top:50%; left:50%;
  transform: translate(-50%,-50%);
  width: 12px; height: 12px;
  border-radius: 50%;
  background: currentColor;
  box-shadow: 0 0 10px 4px currentColor;
}
.shell-electron {
  position: absolute;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: currentColor;
  box-shadow: 0 0 5px 2px currentColor;
}
#panel-shells-str {
  text-align: center;
  font-size: 0.65rem;
  opacity: 0.6;
  margin-top: 0.25rem;
  letter-spacing: 0.1em;
}
#panel-name {
  font-family: var(--font-head);
  font-size: 0.95rem;
  font-weight: 700;
  text-align: center;
  letter-spacing: 0.08em;
  margin-top: 0.5rem;
}
#panel-num {
  text-align: center; font-size: 0.68rem;
  color: #555; margin-top: 0.15rem; letter-spacing: 0.04em;
}
.panel-divider { height: 1px; margin: 0.8rem 0; opacity: 0.2; }
.panel-row {
  display: flex; justify-content: space-between;
  align-items: baseline; margin-bottom: 0.4rem;
}
.panel-lbl { font-size: 0.65rem; color: #555; text-transform: uppercase; letter-spacing: 0.1em; }
.panel-val { font-size: 0.78rem; }
#panel-config { font-size: 0.68rem; text-align: center; margin-top: 0.3rem; opacity: 0.65; }
.panel-badge {
  display: inline-block; padding: 0.15rem 0.55rem;
  border-radius: 2px; font-size: 0.62rem;
  letter-spacing: 0.09em; text-transform: uppercase;
  margin-top: 0.55rem; border: 1px solid currentColor;
}
</style>
</head>
<body>

<div class="legend" id="legend"></div>
<div class="pt-wrap"><div class="pt-grid" id="pt-grid"></div></div>

<div id="info-overlay">
  <div id="info-backdrop" onclick="closePanel()"></div>
  <div id="info-panel">
    <button class="panel-close" onclick="closePanel()">✕</button>

    <div id="shell-wrap"></div>

    <div id="panel-name"></div>

    <div id="panel-rows"></div>
    <div id="panel-config"></div>
    <div id="panel-badge-wrap"></div>
  </div>
</div>

  [116,'Lv','Livermorium','(293)','unknown',16,7,'Unknown','[Rn] 5f¹⁴6d¹⁰7s²7p⁴',[2,8,18,32,32,18,6]],

];

const byNum = {};
ELEMENTS.forEach(e => byNum[e[0]] = e);

/* Legend */
const legendEl = document.getElementById('legend');
Object.entries(CATS).forEach(([k,{label,color}]) => {
  const d = document.createElement('div');
  d.className = 'legend-item';
  d.style.color = color;
  d.style.textShadow = `0 0 8px ${color}88`;
  d.textContent = label;
  legendEl.appendChild(d);
});

/* Grid */
function buildGrid() {
  const grid = document.getElementById('pt-grid');
  const cells = Array.from({length:7}, () => Array(18).fill(null));

  ELEMENTS.forEach(el => {
    const [num,sym,name,mass,cat,group,period] = el;
    if (group && period) cells[period-1][group-1] = el;
  });

  const lants = ELEMENTS.filter(e => e[4]==='lanthanide' && !e[6]);
  const acts  = ELEMENTS.filter(e => e[4]==='actinide'   && !e[6]);

  for (let r = 0; r < 7; r++) {
    for (let c = 0; c < 18; c++) {
      const el = cells[r][c];
      if (!el) {
        const sp = document.createElement('div');
        if ((r===5||r===6) && c===2) {
          sp.className = 'gap-cell';
          sp.innerHTML = `<span>${r===5?'57-71':'89-103'}</span>`;
        } else { sp.className = 'spacer'; }
        grid.appendChild(sp);
        continue;
      }
      grid.appendChild(makeCell(el));
    }
  }

  // Separator
  const sep = document.createElement('div');
  sep.className = 'sep-row';
  grid.appendChild(sep);

  // Lanthanide row
  for (let c = 0; c < 18; c++) {
    if (c < 3) { const s=document.createElement('div'); s.className='spacer'; grid.appendChild(s); continue; }
    const el = lants[c-3];
    grid.appendChild(el ? makeCell(el) : (() => { const s=document.createElement('div'); s.className='spacer'; return s; })());
  }
  // Actinide row
  for (let c = 0; c < 18; c++) {
    if (c < 3) { const s=document.createElement('div'); s.className='spacer'; grid.appendChild(s); continue; }
    const el = acts[c-3];
    grid.appendChild(el ? makeCell(el) : (() => { const s=document.createElement('div'); s.className='spacer'; return s; })());
  }
}

function makeCell(el) {
  const [num,sym,name,mass,cat] = el;
  const color = CATS[cat]?.color || '#888';
  const div = document.createElement('div');
  div.className = 'el';
  div.dataset.num = num;
  div.style.setProperty('--c', color);
  div.innerHTML = `<div class="el-num">${num}</div><div class="el-symbol">${sym}</div><div class="el-name">${name}</div><div class="el-mass">${mass}</div>`;
  div.addEventListener('click', () => showEl(num));
  return div;
}

/* Panel */
let activeNum = null;

function showEl(num) {
  const el = byNum[num];
  if (!el) return;
  const [n,sym,name,mass,cat,group,period,state,config,shells] = el;
  const color = CATS[cat]?.color || '#888';

  if (activeNum) document.querySelector(`.el[data-num="${activeNum}"]`)?.classList.remove('active');
  activeNum = num;
  document.querySelector(`.el[data-num="${num}"]`)?.classList.add('active');

  const panel = document.getElementById('info-panel');
  panel.style.borderColor = color;
  panel.style.boxShadow = `0 0 30px -5px ${color}, 0 0 60px -15px ${color}`;

  const symEl = document.getElementById('panel-symbol');
  symEl.textContent = sym;
  symEl.style.color = color;
  symEl.style.textShadow = `0 0 20px ${color}, 0 0 40px ${color}88`;

  buildShellDiagram(shells, color);
  document.getElementById('panel-shells-str').style.color = color;
  document.getElementById('panel-shells-str').textContent = shells.join(' - ');

  const nameEl = document.getElementById('panel-name');
  nameEl.textContent = name;
  nameEl.style.color = color;
  nameEl.style.textShadow = `0 0 10px ${color}66`;

  document.getElementById('panel-num').textContent = `Atomic Number ${n}`;
  document.getElementById('panel-div').style.background = color;

  const rows = [
    ['Atomic Mass', mass + ' u'],
    ['State (STP)', state],
    group  ? ['Group',  group]  : null,
    period ? ['Period', period] : null,
  ].filter(Boolean);

  document.getElementById('panel-rows').innerHTML = rows.map(([l,v]) =>
    `<div class="panel-row"><span class="panel-lbl">${l}</span><span class="panel-val" style="color:${color};text-shadow:0 0 8px ${color}66">${v}</span></div>`
  ).join('');

  const cfgEl = document.getElementById('panel-config');
  cfgEl.style.color = color;
  cfgEl.textContent = config;

  document.getElementById('panel-badge-wrap').innerHTML =
    `<span class="panel-badge" style="color:${color};border-color:${color};background:${color}18">${CATS[cat]?.label||'Unknown'}</span>`;

  document.getElementById('info-overlay').classList.add('open');
}

function buildShellDiagram(shells, color) {
  const wrap = document.getElementById('shell-wrap');
  wrap.innerHTML = '';
  wrap.style.color = color;

  const nuc = document.createElement('div');
  nuc.className = 'shell-nucleus';
  wrap.appendChild(nuc);

  const maxShells = Math.min(shells.length, 4);
  if (maxShells < 2) {
    const maxR = 50, minR = 18;
    const r = minR;
    addOrbit(wrap, r, shells[0] || 0, color, 2.2);
    return;
  }
  const maxR = 58, minR = 16;
  for (let i = 0; i < maxShells; i++) {
    const r = minR + (maxR - minR) * (i / (maxShells - 1));
    addOrbit(wrap, r, shells[i], color, 2 + i * 1.4);
  }
}

function addOrbit(wrap, r, count, color, duration) {
  const orbit = document.createElement('div');
  orbit.className = 'shell-orbit';
  orbit.style.width = orbit.style.height = (r*2)+'px';
  orbit.style.borderColor = color;

  const shown = Math.min(count, 8);
  for (let e = 0; e < shown; e++) {
    const angle = (2*Math.PI*e/shown) - Math.PI/2;
    const dot = document.createElement('div');
    dot.className = 'shell-electron';
    dot.style.left = `calc(50% + ${Math.cos(angle)*r - 2.5}px)`;
    dot.style.top  = `calc(50% + ${Math.sin(angle)*r - 2.5}px)`;
    dot.style.background = color;
    dot.style.boxShadow = `0 0 5px 2px ${color}`;
    orbit.appendChild(dot);
  }

  // Count label
  const lbl = document.createElement('div');
  lbl.style.cssText = `position:absolute;right:-20px;top:50%;transform:translateY(-50%);font-size:0.55rem;color:${color};opacity:0.6`;
  lbl.textContent = count;
  orbit.appendChild(lbl);

  wrap.appendChild(orbit);
}

function closePanel() {
  document.getElementById('info-overlay').classList.remove('open');
  if (activeNum) {
    document.querySelector(`.el[data-num="${activeNum}"]`)?.classList.remove('active');
    activeNum = null;
  }
}

buildGrid();

// Stagger-in animation
document.querySelectorAll('.el:not(.spacer):not(.gap-cell)').forEach((el, i) => {
  el.style.opacity = '0';
  el.style.transform = 'scale(0.65)';
  el.style.transition = `opacity 0.35s ease ${i*4.5}ms, transform 0.35s ease ${i*4.5}ms`;
  setTimeout(() => {
    el.style.opacity = '1';
    el.style.transform = '';
  }, 20 + i * 4.5);
});
</script>
